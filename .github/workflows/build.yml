name: Build & cache

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            accept-flake-config = true
            auto-optimise-store = true

      - name: Check flake
        run: nix flake check --all-systems --no-build

      - name: Build all packages
        run: nix build .#packages.x86_64-linux --no-link

      - name: Show package count
        run: nix eval .#packages.x86_64-linux --apply 'x: builtins.attrNames x' | jq 'length'

      - name: Push to Cachix (if configured)
        if: github.ref == 'refs/heads/main' && env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v15
        with:
          name: neg-serg
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
